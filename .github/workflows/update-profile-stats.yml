name: Update profile stats

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/generate-profile-stats.mjs
      - .github/workflows/update-profile-stats.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/generate-profile-stats.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/github-stats.svg assets/top-languages.svg
          git diff --cached --quiet || git commit -m 'chore: update profile stats'
          git push
